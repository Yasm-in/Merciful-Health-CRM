<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merciful Health CRM</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <main class="container">
        <header class="hero">
            <div>
                <h1>Merciful Health CRM</h1>
                <p>Advanced patient lifecycle dashboard for clinic teams.</p>
            </div>
            <a class="btn-outline" href="/api/export/patients.csv">Export CSV</a>
        </header>

        <section class="metrics-grid">
            <article class="metric-card"><p>Total Patients</p><h3 id="m-total">0</h3></article>
            <article class="metric-card"><p>New</p><h3 id="m-new">0</h3></article>
            <article class="metric-card"><p>In Treatment</p><h3 id="m-treatment">0</h3></article>
            <article class="metric-card"><p>Follow-up Needed</p><h3 id="m-followup">0</h3></article>
            <article class="metric-card"><p>Closed Cases</p><h3 id="m-closed">0</h3></article>
        </section>

        <section class="grid">
            <section class="card">
                <h2>Add Patient</h2>
                <form id="patient-form">
                    <input name="full_name" placeholder="Full name" required>
                    <input name="phone" placeholder="Phone number" required>
                    <select name="status" required>
                        <option value="">Select status</option>
                        <option value="New">New</option>
                        <option value="In Treatment">In Treatment</option>
                        <option value="Follow-up Needed">Follow-up Needed</option>
                        <option value="Closed">Closed</option>
                    </select>
                    <input name="next_follow_up" type="date">
                    <textarea name="notes" placeholder="Patient notes"></textarea>
                    <button type="submit">Save Patient</button>
                </form>
            </section>

            <section class="card">
                <h2>Status Distribution</h2>
                <canvas id="statusChart"></canvas>
                <h2 class="activity-title">Recent Activity</h2>
                <ul id="activity-list" class="activity-list"></ul>
            </section>
        </section>

        <section class="card">
            <div class="toolbar">
                <h2>Patient Registry</h2>
                <div class="filters">
                    <input id="search-input" placeholder="Search patient or notes...">
                    <select id="status-filter">
                        <option value="">All statuses</option>
                        <option value="New">New</option>
                        <option value="In Treatment">In Treatment</option>
                        <option value="Follow-up Needed">Follow-up Needed</option>
                        <option value="Closed">Closed</option>
                    </select>
                </div>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Phone</th>
                        <th>Status</th>
                        <th>Next Follow-up</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="patient-table-body"></tbody>
            </table>
        </section>
    </main>

    <script>
        const form = document.getElementById("patient-form");
        const tableBody = document.getElementById("patient-table-body");
        const statusFilter = document.getElementById("status-filter");
        const searchInput = document.getElementById("search-input");
        const activityList = document.getElementById("activity-list");
        let chart;

        async function loadPatients() {
            const query = new URLSearchParams({
                status: statusFilter.value,
                search: searchInput.value.trim()
            });
            const response = await fetch(`/api/patients?${query.toString()}`);
            const patients = await response.json();
            tableBody.innerHTML = "";
            patients.forEach((patient) => {
                const row = document.createElement("tr");
                row.innerHTML = `
                    <td>${patient.full_name}</td>
                    <td>${patient.phone}</td>
                    <td><span class="badge badge-${patient.status.replace(/\s+/g, "").toLowerCase()}">${patient.status}</span></td>
                    <td>${patient.next_follow_up || "Not set"}</td>
                    <td class="actions">
                        <button data-id="${patient.id}" data-action="progress">Progress</button>
                        <button data-id="${patient.id}" data-action="delete" class="danger">Delete</button>
                    </td>
                `;
                tableBody.appendChild(row);
            });
        }

        async function loadDashboard() {
            const response = await fetch("/api/dashboard");
            const data = await response.json();
            const summary = data.summary;
            document.getElementById("m-total").textContent = summary.total_patients || 0;
            document.getElementById("m-new").textContent = summary.new_patients || 0;
            document.getElementById("m-treatment").textContent = summary.in_treatment || 0;
            document.getElementById("m-followup").textContent = summary.follow_up_needed || 0;
            document.getElementById("m-closed").textContent = summary.closed_cases || 0;

            activityList.innerHTML = "";
            data.recent_activity.forEach((item) => {
                const li = document.createElement("li");
                li.textContent = `${item.action}: ${item.description}`;
                activityList.appendChild(li);
            });

            const chartData = [
                summary.new_patients || 0,
                summary.in_treatment || 0,
                summary.follow_up_needed || 0,
                summary.closed_cases || 0
            ];

            if (chart) chart.destroy();
            chart = new Chart(document.getElementById("statusChart"), {
                type: "doughnut",
                data: {
                    labels: ["New", "In Treatment", "Follow-up Needed", "Closed"],
                    datasets: [{
                        data: chartData,
                        backgroundColor: ["#38bdf8", "#6366f1", "#f59e0b", "#22c55e"]
                    }]
                },
                options: {
                    plugins: {
                        legend: { labels: { color: "#dbeafe" } }
                    }
                }
            });
        }

        async function updatePatientStatus(patientId) {
            const next = prompt("Update status to: New, In Treatment, Follow-up Needed, Closed");
            if (!next) return;
            await fetch(`/api/patients/${patientId}`, {
                method: "PATCH",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ status: next })
            });
            loadAll();
        }

        async function deletePatient(patientId) {
            if (!confirm("Delete this patient record?")) return;
            await fetch(`/api/patients/${patientId}`, { method: "DELETE" });
            loadAll();
        }

        async function loadAll() {
            await Promise.all([loadPatients(), loadDashboard()]);
        }

        form.addEventListener("submit", async (event) => {
            event.preventDefault();
            const data = Object.fromEntries(new FormData(form).entries());
            const response = await fetch("/api/patients", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data),
            });

            if (response.ok) {
                form.reset();
                loadAll();
            } else {
                const error = await response.json();
                alert(error.error || "Could not save patient");
            }
        });

        tableBody.addEventListener("click", (event) => {
            const button = event.target.closest("button[data-id]");
            if (!button) return;
            const patientId = button.getAttribute("data-id");
            const action = button.getAttribute("data-action");
            if (action === "progress") updatePatientStatus(patientId);
            if (action === "delete") deletePatient(patientId);
        });

        statusFilter.addEventListener("change", loadPatients);
        searchInput.addEventListener("input", loadPatients);

        loadAll();
    </script>
</body>
</html>
